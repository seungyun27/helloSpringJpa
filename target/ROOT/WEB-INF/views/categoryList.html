<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>카테고리 관리창</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container" style="max-width: 800px; margin-top: 50px;">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">카테고리 목록</h2>
        <div>
            <a th:href="@{/categories/create}" class="btn btn-primary me-2">+ 새 카테고리 등록</a>
            <a th:href="@{/products}" class="btn btn-outline-secondary">상품 목록</a>
        </div>
    </div>
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <table class="table table-hover table-bordered bg-white">
        <thead class="table-primary">
        <tr>
            <th>ID</th>
            <th>카테고리명</th>
            <th class="text-center">편집</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cat : ${categories}">
            <td th:text="${cat.id}"></td>
            <td th:text="${cat.name}"></td>
            <td class="text-center">
                <form th:action="@{/categories/{id}/delete(id=${cat.id})}" method="post">
                    <button type="submit" class="btn btn-danger btn-sm">삭제</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(categories)}">
            <td colspan="3" class="text-center text-muted">등록된 카테고리가 없습니다.</td>
        </tr>
        </tbody>
    </table>

    <footer style="margin-top: 20px; padding: 0 10px; background-color: #f0f0f0;">
        <p style="margin: 0; line-height: 1;" th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 (E) a hh:mm:ss') + '  |  학번: 2291073  |  성명: 김승윤'}"></p>
    </footer>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
